<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ماشین‌حساب</title>
    <style>
        :root { --bg: #f0f2f5; --calc: #ffffff; --text: #333; --btn: #fdfdfd; --op: #ff8c00; }
        [data-theme='dark'] { --bg: #121212; --calc: #1e1e1e; --text: #ffffff; --btn: #2d2d2d; --op: #ff8c00; }

        * { box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg); font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* ماشین‌حساب با ارتفاعِ کنترل‌شده */
        .calculator { background: var(--calc); padding: 15px; border-radius: 30px; width: 320px; max-height: 95vh; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 5px; }
        #theme-toggle { background: var(--btn); border: none; padding: 4px 10px; border-radius: 10px; cursor: pointer; color: var(--text); font-size: 0.8rem; }

        .display { text-align: right; padding: 10px; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
        #main-expr { font-size: 2.5rem; font-weight: 800; color: var(--text); width: 100%; overflow-x: auto; white-space: nowrap; direction: ltr; text-align: right; }
        #main-expr::-webkit-scrollbar { display: none; }
        #temp-result { font-size: 1rem; color: #888; height: 20px; text-align: right; direction: ltr; }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex-grow: 1; }
        button { height: 50px; border: none; border-radius: 15px; font-size: 1.4rem; font-weight: 600; cursor: pointer; background: var(--btn); color: var(--text); transition: 0.1s; }
        button:active { transform: scale(0.95); }
        .operator { color: var(--op); font-weight: bold; }
        .equals { background: var(--op); color: white; grid-row: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="top-bar">
        <button id="theme-toggle" onclick="toggleTheme()">تغییر تم</button>
    </div>
    <div class="display">
        <div id="temp-result"></div>
        <div id="main-expr" dir="ltr">0</div>
    </div>
    <div class="buttons">
        <button class="operator" onclick="addChar('÷')">÷</button>
        <button onclick="addChar('%')">%</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="clearAll()" style="color: var(--op);">AC</button>
        
        <button class="operator" onclick="addChar('×')">×</button>
        <button onclick="addChar('9')">9</button>
        <button onclick="addChar('8')">8</button>
        <button onclick="addChar('7')">7</button>
        
        <button class="operator" onclick="addChar('-')">-</button>
        <button onclick="addChar('6')">6</button>
        <button onclick="addChar('5')">5</button>
        <button onclick="addChar('4')">4</button>
        
        <button class="operator" onclick="addChar('+')">+</button>
        <button onclick="addChar('3')">3</button>
        <button onclick="addChar('2')">2</button>
        <button onclick="addChar('1')">1</button>
        
        <button class="equals" onclick="calculate()">=</button>
        <button onclick="addChar('.')">.</button>
        <button onclick="addChar('0')">0</button>
        <div></div>
    </div>
</div>

<script>
    let expression = "";
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);

    function toggleTheme() {
        let theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }

    function addChar(char) {
        const ops = ['+', '-', '×', '÷'];
        if (char === '.' && (expression === "" || expression === "0")) { expression = "0."; updateDisplay(); return; }
        if (ops.includes(char)) {
            let last = expression.slice(-1);
            if (ops.includes(last)) { expression = expression.slice(0, -1) + char; updateDisplay(); return; }
        }
        if (expression === "0" && char !== ".") expression = char;
        else expression += char;
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('main-expr').innerText = expression || "0";
        const opRegex = /[\+\-×÷]/;
        if (opRegex.test(expression)) {
            try {
                let calc = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/%/g, '/100');
                if (!isNaN(calc.slice(-1)) && calc !== "") document.getElementById('temp-result').innerText = eval(calc);
                else document.getElementById('temp-result').innerText = "";
            } catch { document.getElementById('temp-result').innerText = ""; }
        } else { document.getElementById('temp-result').innerText = ""; }
    }

    function calculate() {
        try {
            let calc = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/%/g, '/100');
            if (['+', '-', '*', '/'].includes(calc.slice(-1))) calc = calc.slice(0, -1);
            let res = eval(calc);
            res = Math.round(res * 100000000) / 100000000;
            document.getElementById('main-expr').innerText = res;
            document.getElementById('temp-result').innerText = "";
            expression = res.toString();
        } catch { document.getElementById('main-expr').innerText = "خطا"; expression = ""; document.getElementById('temp-result').innerText = ""; }
    }

    function clearAll() { expression = ""; document.getElementById('main-expr').innerText = "0"; document.getElementById('temp-result').innerText = ""; }
    function backspace() { expression = expression.slice(0, -1); updateDisplay(); }
</script>
</body>
</html>
